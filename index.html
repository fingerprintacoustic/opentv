<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenTV - Free Live TV</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="OpenTV">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;height:100vh;overflow:hidden}
#app{display:flex;height:100vh}
#sidebar{width:280px;background:#111;display:flex;flex-direction:column;border-right:1px solid #1e1e1e}
#hdr{padding:12px;background:#0d0d1f;border-bottom:1px solid #1e1e1e}
#logo{font-size:2em;font-weight:900;color:#e50914;letter-spacing:4px}#logo span{color:#fff}
#sub{font-size:0.65em;color:#444;margin-top:2px;letter-spacing:1px}
#srch{width:100%;padding:9px 12px;background:#0a0a0a;border:none;border-bottom:1px solid #1e1e1e;color:#fff;font-size:0.85em;outline:none}
#srch::placeholder{color:#333}
#gtabs{display:flex;overflow-x:auto;background:#0d0d0d;border-bottom:1px solid #1a1a1a;scrollbar-width:none}
#gtabs::-webkit-scrollbar{display:none}
.gt{flex-shrink:0;padding:6px 10px;font-size:0.68em;cursor:pointer;color:#555;border-bottom:2px solid transparent;white-space:nowrap}
.gt.on{color:#e50914;border-bottom-color:#e50914}
#clist{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#222 #111}
#clist::-webkit-scrollbar{width:3px}
#clist::-webkit-scrollbar-thumb{background:#222}
.ch{display:flex;align-items:center;padding:8px 10px;cursor:pointer;border-bottom:1px solid #141414;gap:8px}
.ch:hover,.ch.on{background:#131323}
.ch.on{border-left:3px solid #e50914}
.ch.failed{opacity:0.35}
.cico{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0}
.ch.extlink .cico{background:#2ea8e5}
.ch.failed .cico{background:#e50914}
.cname{font-size:0.78em;color:#bbb}
.cgrp{font-size:0.6em;color:#3a3a3a;margin-top:1px}
.extbadge{margin-left:auto;font-size:0.55em;color:#2ea8e5;border:1px solid #1a3a4a;padding:1px 5px;border-radius:3px}
.failbadge{margin-left:auto;font-size:0.55em;color:#e50914;border:1px solid #4a1a1a;padding:1px 5px;border-radius:3px}
#pa{flex:1;display:flex;flex-direction:column;background:#000}
#pbar{height:3px;background:#e50914;width:0;transition:width 0.3s}
#vw{flex:1;position:relative}
video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
#ov{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px}
#ovlogo{font-size:3em;font-weight:900;color:#e50914;letter-spacing:6px}#ovlogo span{color:#fff}
#ovtxt{color:#888;font-size:0.9em;max-width:400px}
#ovcount{color:#e50914;font-size:1.2em;font-weight:bold;min-height:26px}
#bot{padding:8px 14px;background:#0a0a0a;border-top:1px solid #1a1a1a;display:flex;align-items:center;gap:8px;min-height:40px}
#livdot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0}
#livdot.live{background:#e50914;animation:pulse 1.3s infinite}
#livdot.error{background:#e50914}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
#nowname{font-size:0.78em;color:#888}#nowname b{color:#ddd}
#chcount{font-size:0.65em;color:#333;margin-left:auto}
@media(max-width:650px){#app{flex-direction:column}#sidebar{width:100%;height:42vh;border-right:none;border-bottom:1px solid #1e1e1e}#pa{height:58vh}}
</style>
</head>
<body>
<div id="app">
<div id="sidebar">
<div id="hdr"><div id="logo">Open<span>TV</span></div><div id="sub">FREE LIVE TV</div></div>
<input id="srch" placeholder="Search channels..." type="text">
<div id="gtabs"></div>
<div id="clist"></div>
</div>
<div id="pa">
<div id="pbar"></div>
<div id="vw">
<video id="vid" controls playsinline></video>
<div id="ov">
<div id="ovlogo">Open<span>TV</span></div>
<div id="ovtxt">Loading channel list...</div>
<div id="ovcount"></div>
</div>
</div>
<div id="bot"><div id="livdot"></div><div id="nowname"><b id="nn">Select a channel to watch</b></div><div id="chcount"></div></div>
</div>
</div>
<script>
// Special non-stream tiles (deep links, not HLS)
const EXTRA_CHANNELS = [
  { n: 'World Cup 2026 (SBS - AU only)', g: 'Sports', link: 'https://www.sbs.com.au/ondemand/fifa-world-cup-2026' },
];

// Live channel lists pulled from the iptv-org project (continuously verified,
// same source used by most IPTV apps). Fetched at runtime so links stay fresh
// instead of being hand-typed and going stale.
const SOURCE_LISTS = [
  { url: 'https://iptv-org.github.io/iptv/categories/news.m3u', group: 'News', limit: 25 },
  { url: 'https://iptv-org.github.io/iptv/categories/sports.m3u', group: 'Sports', limit: 20 },
  { url: 'https://iptv-org.github.io/iptv/categories/movies.m3u', group: 'Movies', limit: 20 },
  { url: 'https://iptv-org.github.io/iptv/categories/music.m3u', group: 'Music', limit: 15 },
  { url: 'https://iptv-org.github.io/iptv/categories/documentary.m3u', group: 'Documentary', limit: 15 },
  { url: 'https://iptv-org.github.io/iptv/categories/general.m3u', group: 'Entertainment', limit: 20 },
];

let CHANNELS = [...EXTRA_CHANNELS];
let group='All',hlsi=null,actEl=null,failTimer=null;
const vid=document.getElementById('vid'),ov=document.getElementById('ov'),ovtxt=document.getElementById('ovtxt'),ovcount=document.getElementById('ovcount'),clist=document.getElementById('clist'),srch=document.getElementById('srch'),gtabs=document.getElementById('gtabs'),nn=document.getElementById('nn'),livdot=document.getElementById('livdot'),chcount=document.getElementById('chcount'),pbar=document.getElementById('pbar');

function parseM3U(text, fallbackGroup) {
  const lines = text.split('\n');
  const out = [];
  let name = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF')) {
      const nameMatch = line.match(/,(.*)$/);
      name = nameMatch ? nameMatch[1].trim() : 'Channel';
      const grpMatch = line.match(/group-title="([^"]*)"/);
      const g = grpMatch && grpMatch[1] ? grpMatch[1] : fallbackGroup;
      const next = lines[i + 1] ? lines[i + 1].trim() : '';
      if (next && !next.startsWith('#')) {
        out.push({ n: name, g: g || fallbackGroup, u: next });
      }
    }
  }
  return out;
}

async function loadChannels() {
  const results = await Promise.allSettled(
    SOURCE_LISTS.map(src => fetch(src.url).then(r => {
      if (!r.ok) throw new Error('bad status ' + r.status);
      return r.text();
    }).then(text => parseM3U(text, src.group).slice(0, src.limit)))
  );
  let loaded = [];
  let anySuccess = false;
  results.forEach((res, i) => {
    if (res.status === 'fulfilled') {
      anySuccess = true;
      loaded = loaded.concat(res.value);
    } else {
      console.warn('Failed to load', SOURCE_LISTS[i].url, res.reason);
    }
  });
  CHANNELS = [...EXTRA_CHANNELS, ...loaded];
  return anySuccess;
}

function buildTabs(){
  const gs=['All',...new Set(CHANNELS.map(c=>c.g).filter(Boolean).sort())];
  gtabs.innerHTML='';
  gs.forEach(g=>{
    const t=document.createElement('div');t.className='gt'+(g===group?' on':'');t.textContent=g;
    t.onclick=()=>{group=g;document.querySelectorAll('.gt').forEach(x=>x.classList.remove('on'));t.classList.add('on');render();};
    gtabs.appendChild(t);});
}

function render(){
  const q=srch.value.toLowerCase();
  const list=CHANNELS.filter(c=>(group==='All'||c.g===group)&&(!q||c.n.toLowerCase().includes(q)));
  chcount.textContent=list.length+' channels';
  clist.innerHTML='';
  list.forEach(c=>{
    const key=c.u||c.link;
    const d=document.createElement('div');
    d.className='ch'+(c.link?' extlink':'')+(c.failed?' failed':'')+(actEl&&actEl.dataset.key===key?' on':'');
    d.dataset.key=key;
    d.innerHTML='<div class="cico"></div><div><div class="cname">'+c.n+'</div><div class="cgrp">'+c.g+'</div></div>'+
      (c.link?'<div class="extbadge">OPEN</div>':(c.failed?'<div class="failbadge">FAILED</div>':''));
    d.onclick=()=>c.link?openExternal(c,d):play(c,d);
    clist.appendChild(d);
  });
}

function openExternal(c,el){
  if(actEl)actEl.classList.remove('on');
  actEl=el;el.classList.add('on');
  window.open(c.link,'_blank','noopener');
}

function showError(msg){
  ov.style.display='flex';
  ovtxt.textContent=msg;
  ovcount.textContent='';
  livdot.className='error';
}

function play(c,el){
  if(actEl)actEl.classList.remove('on');
  actEl=el;el.classList.add('on');
  nn.textContent=c.n;livdot.className='';ov.style.display='none';
  if(hlsi){hlsi.destroy();hlsi=null;}
  if(failTimer)clearTimeout(failTimer);

  // If nothing plays within 9s, surface a real error instead of staying blank
  failTimer=setTimeout(()=>{
    if(vid.readyState<2){
      c.failed=true;
      showError('"'+c.n+'" is not responding - it may be geo-blocked, offline, or blocked by the browser. Try another channel.');
      render();
    }
  },9000);

  if(vid.canPlayType('application/vnd.apple.mpegURL')||vid.canPlayType('application/x-mpegURL')){
    vid.src=c.u;vid.play().then(()=>{clearTimeout(failTimer);livdot.className='live';}).catch(()=>{});
  }else if(Hls.isSupported()){
    hlsi=new Hls();hlsi.loadSource(c.u);hlsi.attachMedia(vid);
    hlsi.on(Hls.Events.MANIFEST_PARSED,()=>{vid.play().then(()=>{clearTimeout(failTimer);livdot.className='live';}).catch(()=>{});});
    hlsi.on(Hls.Events.ERROR,(_,d)=>{
      if(d.fatal){
        clearTimeout(failTimer);
        c.failed=true;
        showError('"'+c.n+'" failed to load ('+(d.details||'stream error')+'). Try another channel.');
        render();
      }
    });
  }else{
    clearTimeout(failTimer);
    showError('Browser not supported. Use Chrome, Firefox, Edge or Safari.');
  }
}

srch.addEventListener('input',render);

(async function init(){
  ovtxt.textContent='Loading channel list...';
  const ok = await loadChannels();
  if(!ok){
    showError('Could not load the channel list right now - check your connection and reload.');
    buildTabs();render();
    return;
  }
  buildTabs();render();
  ovtxt.textContent='Pick any channel to start watching 📺';
  ovcount.textContent='';
})();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('service-worker.js').catch(()=>{});});
}
</script>
</body>
</html>
